version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - gochecknoinits
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    errcheck:
      # Writes to stdout/stderr (CLI progress, log lines) don't warrant error
      # handling; everything else must still be checked.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - wrapperFunc
        - hugeParam
        - rangeValCopy
        - singleCaseSwitch
        - ifElseChain
      enabled-tags:
        - performance
        - style
        - experimental
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    rules:
      # Test files: relax duplication, security, and unused-arg noise.
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - errcheck
          - unparam
          - bodyclose
      - path: _test\.go$
        linters:
          - revive
          - unparam
          - unused
        text: unused-parameter
      # Generated mocks are not held to our style rules.
      - path: mocks/
        linters:
          - revive
          - dupl
          - unparam
      # httplog is adapted third-party access-log code kept close to upstream.
      - path: httplog/
        linters:
          - revive
          - gocritic
          - gocyclo
          - gosec
          - dupl
          - staticcheck

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/assanoff/skit
  exclusions:
    generated: lax
    paths:
      - httplog
      - third_party$
      - builtin$
      - examples$
